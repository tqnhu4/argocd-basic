apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gitops
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: nginx=tqnhu4/angocd-basic

    # Strategy (production)
    argocd-image-updater.argoproj.io/nginx.update-strategy: semver
    argocd-image-updater.argoproj.io/nginx.allow-tags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$

    # Git write-back
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main

    # Target file
    argocd-image-updater.argoproj.io/write-back-target: kustomization
spec:
  project: default

  source:
    repoURL: https://github.com/tqnhu4/argocd-basic.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true