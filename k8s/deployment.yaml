apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:134434b45f7a7bc1562f2b18a617b1c9625e7e2f
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80