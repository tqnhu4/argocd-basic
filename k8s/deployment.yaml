apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:53adbf0cea4c29287ccfa9df52fc2d40d9f982e9
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80