apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:c2a92a42f382495bf1dd4b9cdacf667a483c0dac
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80