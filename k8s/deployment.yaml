apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:182ecfe9462b8aecfd3093d00f807101b483f1ef
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80