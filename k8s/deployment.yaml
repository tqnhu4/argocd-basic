apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:8aae1a214845ac18eaf842522e690bcb83a4d8a4
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80