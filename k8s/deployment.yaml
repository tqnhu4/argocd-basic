apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:4132a4e6596f6c53c4da0ca2f2de0d59a51ec08b
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80