apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:b521e08501dfba5db6767e6f6902e5c087375026
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80