apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:c75401bf9ad2de9287c708a2563f152ec1ea06ba
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80