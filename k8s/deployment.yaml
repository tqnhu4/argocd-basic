apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:2d1728f29e3ad65b84cb15f4a76aee778f931c34
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80