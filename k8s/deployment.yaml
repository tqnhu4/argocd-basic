apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:ee18b1cd9421f607369796f3e49392c66fb55348
          imagePullPolicy: Always # Important
          ports:
            - containerPort: 80
