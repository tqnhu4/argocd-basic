apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:d93d44e6eccbdc98ec82dd5e18802166016bfceb
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80