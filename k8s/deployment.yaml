apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:5f0fc16c7e04f32ef693637228a53c59c4705ee6
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80