apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:3453437a261342ebe02e6627779b62de07ec5acf
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80