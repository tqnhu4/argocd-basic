apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:5ba9b19a8b3b75cb3b3c8bf2f8928360befd6626
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80