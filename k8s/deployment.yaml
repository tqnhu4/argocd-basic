apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:07e82cf158273c15233797bcb6ae521f4db07569
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80