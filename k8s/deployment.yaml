apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:21a11297f9f6885c7f2007f773d01d9530e17bff
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80