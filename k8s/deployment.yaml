apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:c5b7e44424b7d109681d966c480a10f86442e158
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80