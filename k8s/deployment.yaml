apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:eb1b695c6886b65ac2f27ef85d446eab7d8dca59
          imagePullPolicy: Always # Important
          ports:
            - containerPort: 80
