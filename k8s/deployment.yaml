apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:3d78a190f417013f5fd1396cc2ae723bea4ba72a
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80