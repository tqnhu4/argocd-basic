apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:1dfae8101d36bd00acf929876222bfc5249431e4
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80