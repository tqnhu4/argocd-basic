apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:d13fe172628d1b921d01ba5488bbd2a83267ca0a
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80