apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:decc74b8903b08970cd13e2bbf658d88418b951f
          imagePullPolicy: Always # Important
          ports:
            - containerPort: 80
