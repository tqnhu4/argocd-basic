apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nhutq/angocd-basic:bb6d39bf378df2ef03982e67547a219127afe5c2
          imagePullPolicy: Always   # Important
          ports:
            - containerPort: 80