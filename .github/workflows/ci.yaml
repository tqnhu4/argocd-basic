name: Build & Update Image

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/angocd-basic

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 🔑 Login DockerHub
    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build & Push
    - name: Build & Push Image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} .
        docker push $IMAGE_NAME:${{ github.sha }}

    # ✏️ Update deployment.yaml
    - name: Update Image Tag
      run: |
        #sed -i "s|image: .*|image: $IMAGE_NAME:${{ github.sha }}|g" k8s/deployment.yaml
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME:${{ github.sha }}|g" k8s/deployment.yaml

    # 📤 Commit Git again (🔥 KEY) 
    - name: Commit & Push
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add k8s/deployment.yaml
        git commit -m "update image tag"
        git push